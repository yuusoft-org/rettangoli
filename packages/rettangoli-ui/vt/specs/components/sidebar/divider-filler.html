<rtgl-view g="lg" h="100vh" w="100vw" p="lg">
  <rtgl-sidebar id="sidebar" h="540"></rtgl-sidebar>
</rtgl-view>

<script>
  const sidebar = document.getElementById('sidebar');

  sidebar.header = {
    label: "Workspace",
    image: {
      src: "/public/sample1.jpg",
      width: 32,
      height: 32,
      alt: "Workspace",
    },
  };

  sidebar.selectedItemId = "settings";
  sidebar.items = [
    { id: "home", label: "Home", icon: "home" },
    { id: "search", label: "Search", icon: "search" },
    { type: "divider" },
    { id: "projects", label: "Projects" },
    { type: "spacer" },
    { type: "divider" },
    { id: "settings", label: "Settings", icon: "gear" },
    { id: "privacy", label: "Privacy" },
  ];

  sidebar.render();
</script>
