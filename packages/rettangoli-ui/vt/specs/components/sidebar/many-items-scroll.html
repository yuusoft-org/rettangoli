---
title: "Many Items"
description: "Verifies the sidebar layout with a long item list using an internal vertical scroll surface."
specs:
  - "Sidebar renders many items with `sv` on the internal list container."
  - "Header and item list remain visually coherent in the full-height layout."
---
<rtgl-view g="lg" h="100vh" w="f" wrap>
  <rtgl-sidebar id="sidebar"></rtgl-sidebar>
</rtgl-view>

<script>
  const sidebar = document.getElementById('sidebar');

  sidebar.header = {
    label: "Sidebar",
    image: {
      src: "/public/sample1.jpg",
      width: 32,
      height: 32,
      alt: "Sidebar",
    },
  };

  sidebar.items = [
    { type: "groupLabel", title: "Main" },
    ...Array.from({ length: 30 }, (_, i) => ({
      id: `main-${i + 1}`,
      title: `Main Item ${i + 1}`,
    })),
    { type: "groupLabel", title: "Settings" },
    ...Array.from({ length: 30 }, (_, i) => ({
      id: `settings-${i + 1}`,
      title: `Settings Item ${i + 1}`,
    })),
  ];

  sidebar.render();
</script>
