refs:
  selectButton:
    eventListeners:
      click:
        handler: handleButtonClick
  clearButton:
    eventListeners:
      click:
        handler: handleClearClick
  popover:
    eventListeners:
      close:
        handler: handleClickOptionsPopoverOverlay
  option*:
    eventListeners:
      click:
        handler: handleOptionClick
      mouseenter:
        handler: handleOptionMouseEnter
      mouseleave:
        handler: handleOptionMouseLeave
  optionAdd:
    eventListeners:
      click:
        handler: handleAddOptionClick
      mouseenter:
        handler: handleAddOptionMouseEnter
      mouseleave:
        handler: handleAddOptionMouseLeave
template:
  - 'rtgl-button#selectButton v=ol style="--rtgl-button-outline-hover-background: var(--background); --rtgl-button-outline-hover-border-color: var(--accent); --rtgl-button-outline-active-background: var(--background); --rtgl-button-outline-active-border-color: var(--accent)" ${containerAttrString} ?disabled=${isDisabled} data-testid="select-button"':
      - rtgl-view d=h av=c ah=s w=f:
          - rtgl-text w=1fg ta=s c=${selectedLabelColor} ellipsis: ${selectedLabel}
          - $if showClear:
              - rtgl-svg#clearButton ml=md svg=x wh=16 c=mu-fg cur=pointer data-testid="select-clear-button": null
          - rtgl-svg ml=md svg=chevronDown wh=16 c=mu-fg: null
  - 'rtgl-popover#popover ?open=${isOpen} x=${position.x} y=${position.y} place=rs style="--rtgl-popover-content-padding: var(--spacing-sm) 0"':
      - rtgl-view wh=300 g=xs slot=content bgc=bg sv=true:
          - $for option, i in options:
              - rtgl-view#option${i} w=f ph=lg pv=md cur=pointer bgc=${option.bgc} data-testid=${option.testId}:
                  - rtgl-text s=sm: ${option.label}
          - $if showAddOption:
              - rtgl-view w=f bw=xs bc=mu bwt=sm: null
              - rtgl-view#optionAdd w=f ph=lg pv=md cur=pointer bgc=${addOptionBgc} data-testid="select-add-option":
                  - rtgl-text s=sm c=ac: ${addOptionLabel}
