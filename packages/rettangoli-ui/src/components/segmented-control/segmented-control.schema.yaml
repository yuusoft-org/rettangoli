componentName: rtgl-segmented-control
propsSchema:
  type: object
  properties:
    placeholder:
      type: string
    options:
      type: array
      items:
        type: object
        properties:
          label:
            type: string
          svg:
            type: string
          ariaLabel:
            type: string
          value:
            type: any
          testId:
            type: string
    selectedValue:
      type: any
    onChange:
      type: function
    noClear:
      type: boolean
    addOption:
      type: object
      properties:
        label:
          type: string
    disabled:
      type: boolean
    s:
      type: string
      enum: [sm, md]
    w:
      type: string
events:
  value-change: {}
  add-option-click: {}
methods:
  type: object
  properties: {}
