runtimeAssets:
  - id: mobile-nav
    stability: stable
    publishedPath: sites/public/mobile-nav.js
    docsPaths:
      - README.md
      - sites/README.md
      - docs/builtin-assets-contract.md
    consumedBy:
      - docs
      - landing-features
      - blog-article-list
      - blog-article
      - mobile-nav
      - top-navbar
    notes:
      - Shared mobile overlay and auto-hide behavior for built-in navigation shells.

  - id: rtgl-icons
    stability: stable
    publishedPath: sites/public/rtgl-icons.js
    docsPaths:
      - README.md
      - sites/README.md
      - docs/builtin-assets-contract.md
    consumedBy:
      - base
      - docs
      - landing-features
      - blog-article-list
      - blog-article
      - navbar
      - mobile-nav
      - top-navbar
    notes:
      - Shared icon registry consumed by built-in templates and nav partials.

themeBundles:
  - id: theme-rtgl-themes
    stability: stable
    publishedPath: sites/themes/theme-rtgl-themes.css
    docsPaths:
      - README.md
      - sites/README.md
      - docs/builtin-assets-contract.md
    classes:
      - mono-light
      - mono-dark
      - slate-light
      - slate-dark
      - catppuccin-latte
      - catppuccin-frappe
      - catppuccin-macchiato
      - catppuccin-mocha
      - github-light
      - github-dark
      - nord-light
      - nord-dark
    vtSpecPaths:
      - vt/specs/themes/mono-light.html
      - vt/specs/themes/mono-dark.html
      - vt/specs/themes/slate-light.html
      - vt/specs/themes/slate-dark.html
      - vt/specs/themes/catppuccin-latte.html
      - vt/specs/themes/catppuccin-frappe.html
      - vt/specs/themes/catppuccin-macchiato.html
      - vt/specs/themes/catppuccin-mocha.html
      - vt/specs/themes/github-light.html
      - vt/specs/themes/github-dark.html
      - vt/specs/themes/nord-light.html
      - vt/specs/themes/nord-dark.html
