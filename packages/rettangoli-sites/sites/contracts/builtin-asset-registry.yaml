schemaVersion: 1

templates:
  - id: base
    stability: stable
    publishedPath: sites/templates/base.yaml
    schemaRef: '#/$defs/template.base'
    docsPaths:
      - README.md
      - sites/README.md
      - docs/builtin-assets-contract.md
    examplePaths:
      - templates/default/templates/base.yaml
    vtSpecPaths: []
    dependencies:
      partials:
        - seo
        - navbar
      runtimeAssets:
        - rtgl-icons
        - mobile-nav
    notes:
      - Base shell template with minimal navbar layout and content slot.
      - Coverage is currently indirect through consumer templates rather than dedicated VT specs.

  - id: docs
    stability: stable
    publishedPath: sites/templates/docs.yaml
    schemaRef: '#/$defs/template.docs'
    docsPaths:
      - README.md
      - sites/README.md
      - docs/builtin-assets-contract.md
    examplePaths:
      - vt/theme-lab/site/templates/docs.yaml
      - vt/theme-lab/site/pages/docs/getting-started.md
    vtSpecPaths:
      - vt/specs/docs-template/docs-getting-started.html
      - vt/specs/docs-template/docs-getting-started-mobile-menu-open.html
    dependencies:
      partials:
        - seo
        - mobile-nav
        - docs-sidebar
      runtimeAssets:
        - mobile-nav
        - rtgl-icons

  - id: landing-features
    stability: stable
    publishedPath: sites/templates/landing-features.yaml
    schemaRef: '#/$defs/template.landingFeatures'
    docsPaths:
      - README.md
      - sites/README.md
      - docs/builtin-assets-contract.md
    examplePaths:
      - vt/theme-lab/site/templates/landing-features.yaml
      - vt/theme-lab/site/pages/templates/landing-features.yaml
    vtSpecPaths:
      - vt/specs/templates/landing-features.html
      - vt/specs/templates/landing-features-mobile-menu-open.html
    dependencies:
      partials:
        - seo
        - top-navbar
        - landing-hero
        - landing-features-section
        - landing-cta
        - footer
      runtimeAssets:
        - mobile-nav
        - rtgl-icons

  - id: blog-article-list
    stability: stable
    publishedPath: sites/templates/blog-article-list.yaml
    schemaRef: '#/$defs/template.blogArticleList'
    docsPaths:
      - README.md
      - sites/README.md
      - docs/builtin-assets-contract.md
    examplePaths:
      - vt/theme-lab/site/templates/blog-article-list.yaml
      - vt/theme-lab/site/pages/templates/blog/article-list.yaml
    vtSpecPaths:
      - vt/specs/templates/blog-article-list.html
    dependencies:
      partials:
        - seo
        - top-navbar
        - footer
      runtimeAssets:
        - mobile-nav
        - rtgl-icons

  - id: blog-article
    stability: stable
    publishedPath: sites/templates/blog-article.yaml
    schemaRef: '#/$defs/template.blogArticle'
    docsPaths:
      - README.md
      - sites/README.md
      - docs/builtin-assets-contract.md
    examplePaths:
      - vt/theme-lab/site/templates/blog-article.yaml
      - vt/theme-lab/site/pages/templates/blog/reducing-friction.md
    vtSpecPaths:
      - vt/specs/templates/blog-article.html
    dependencies:
      partials:
        - seo
        - top-navbar
        - footer
      runtimeAssets:
        - mobile-nav
        - rtgl-icons

