method: user.getProfile
description: Return the authenticated user profile.
middleware:
  before:
    - withAuthUser
  after:
    - withLogger
paramsSchema:
  type: object
  additionalProperties: false
  properties: {}
  required: []
resultSchema:
  type: object
  additionalProperties: false
  properties:
    id:
      type: string
    email:
      type: string
    role:
      type: string
  required:
    - id
    - email
    - role
errorSchema:
  type: object
  additionalProperties: false
  properties:
    _error:
      const: true
    code:
      type: string
    details:
      type: object
      additionalProperties: true
  required:
    - _error
    - code
