file: './getProfile.handlers.js'
group: user-get-profile
---
suite: userGetProfileMethod
exportName: userGetProfileMethod
---
case: returns-profile
proves:
  result: success
in:
  - payload: {}
    context:
      authUser:
        userId: u-1
    deps:
      userDao:
        findById: $mock:findById
out:
  id: u-1
  email: demo@example.com
  role: user
mocks:
  findById:
    calls:
      - in:
          - userId: u-1
        out:
          id: u-1
          email: demo@example.com
          role: user
---
case: requires-auth
proves:
  error: AUTH_REQUIRED
in:
  - payload: {}
    context: {}
    deps:
      userDao:
        findById: $mock:findById
out:
  _error: true
  code: AUTH_REQUIRED
  details:
    reason: auth_required
mocks:
  findById:
    fn: true
---
case: returns-user-not-found-error
proves:
  error: USER_NOT_FOUND
in:
  - payload: {}
    context:
      authUser:
        userId: u-404
    deps:
      userDao:
        findById: $mock:findById
out:
  _error: true
  code: USER_NOT_FOUND
  details:
    userId: u-404
mocks:
  findById:
    calls:
      - in:
          - userId: u-404
        out: __undefined__
