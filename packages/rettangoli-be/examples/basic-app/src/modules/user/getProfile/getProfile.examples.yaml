schemaVersion: rettangoli.examples/v1
file: './getProfile.handlers.js'
group: user-get-profile
runtime:
  setupPath: ./src/setup.examples.js
---
suite: userGetProfileMethod
exportName: userGetProfileMethod
---
case: returns-profile
proves:
  result: success
request:
  id: profile-ok
  params: {}
context:
  authUser:
    userId: u-1
out:
  result:
    id: u-1
    email: demo@example.com
    role: user
---
case: requires-auth
proves:
  error: AUTH_REQUIRED
request:
  id: profile-auth
  params: {}
out:
  error:
    code: -32000
    message: Domain error
    data:
      code: AUTH_REQUIRED
      details:
        reason: auth_required
---
case: returns-user-not-found-error
proves:
  error: USER_NOT_FOUND
request:
  id: profile-missing
  params: {}
context:
  authUser:
    userId: u-404
out:
  error:
    code: -32000
    message: Domain error
    data:
      code: USER_NOT_FOUND
      details:
        userId: u-404
