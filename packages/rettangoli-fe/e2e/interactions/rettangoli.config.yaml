fe:
  dirs: ["fe/components"]
  setup: "fe/setup.js"
  outfile: "vt/static/public/main.js"
  i18n:
    dir: "fe/i18n"
    defaultLocale: "en"
    fallbackLocale: "en"
    locales: ["en", "vi"]

vt:
  path: "vt"
  name: "Example2 FE E2E Tests"
  description: "End-to-end visual and interaction tests for @rettangoli/fe"
  sections:
    - title: "Counter"
      files: "components/counter"
      description: "Counter component tests"
    - title: "ItemList"
      files: "components/item-list"
      description: "Item list component tests"
    - title: "Composed"
      files: "components/composed"
      description: "Composed page integration tests"
    - title: "I18n"
      files: "components/i18n"
      description: "Internationalization runtime tests"
