  faq:
    title: Common Questions
    subtitle: Use an FAQ section when the page needs short answers to setup, usage, or rollout questions near the bottom.
    items:
      - question: Can this section work with simple text-only answers?
        answer: Yes. Each item uses the built-in accordion component with a question label and a short answer body.
      - question: Do I need custom scripting to use the FAQ section?
        answer: No. The accordion behavior comes from the standard Rettangoli UI bundle already used by this template.
      - question: Can teams rewrite the FAQ copy for other page types?
        answer: Yes. The content is data-driven, so the same section can be reused for demos, product pages, or documentation overviews.
