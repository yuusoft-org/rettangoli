      - src: /public/logo-exampleco.png
        alt: ExampleCo
      - src: /public/logo-samplekit.png
        alt: SampleKit
      - src: /public/logo-mockline.png
        alt: Mockline
      - src: /public/logo-demoforge.png
        alt: DemoForge
      - src: /public/logo-fixturelab.png
        alt: FixtureLab
      - src: /public/logo-placeholder.png
        alt: Placeholder
  useCases:
    title: Adapt The Same Template To Different Teams
    subtitle: Audience cards help one landing page speak to multiple internal owners without mixing their priorities together.
    items:
      - eyebrow: Marketing teams
        title: Launch pages that stay on-brand
        pain: Campaign teams need new pages fast but cannot afford one-off layouts every release.
        fit: Reusable sections keep the message consistent while making new launches quicker to assemble.
      - eyebrow: Product teams
        title: Feature stories that stay structured
        pain: Release notes, positioning, and proof points often drift across separate content documents.
        fit: Shared blocks turn feature messaging into one maintained source instead of multiple rewrites.
      - eyebrow: Operations teams
        title: Approval flows that are easier to review
        pain: Reviewers lose time checking spacing, content placement, and CTA consistency on every page.
        fit: Repeatable section patterns make visual review faster and lower the chance of missing regressions.
  iconFeatures:
    title: Flexible Highlight Blocks For Demo Pages
    subtitle: Use icon-led cards to explain product value, workflow benefits, or key selling points in a compact reusable section.
    items:
      - image:
          src: /public/logo-exampleco.png
          alt: Example image badge
        title: Explain Fast Setup In One Scan
        description: Pair a short heading with a concise supporting line so visitors understand the benefit without reading a long section.
      - icon: cluster
        title: Group Related Product Benefits
        description: Present multiple strengths side by side when you want a cleaner summary before longer feature walkthroughs below.
      - icon: globe
        title: Reuse The Same Pattern Across Pages
        description: Swap icons and text to adapt the section for demos, landing pages, release notes, or product overviews.
  featureMosaic:
    title: Use A More Editorial Layout When The Page Needs Rhythm
    subtitle: A lead block plus supporting cards creates a stronger visual story than a uniform grid when the page needs more pacing.
    lead:
      title: Anchor The Story With One Bigger Message
      description: Start with one highlighted message and one strong visual so visitors understand the core proposition before scanning supporting details.
      image:
        src: /public/blog-theme.svg
        alt: Lead feature mosaic preview
      cta:
        label: Open Theme Preview
        href: /themes/slate-dark/
        variant: pr
    items:
      - title: Follow with smaller supporting proofs
        description: Use short cards to reinforce the main message without turning the section into a wall of text.
        image:
          src: /public/blog-partials.svg
          alt: Supporting card preview one
      - title: Keep the reading order obvious
        description: The lead block sets context, and the smaller cards answer the next questions a visitor is likely to have.
        image:
          src: /public/blog-vt.svg
          alt: Supporting card preview two
      - title: Reuse the pattern for future launches
        description: Swap copy and imagery while keeping the same visual hierarchy for future campaigns and release pages.
        image:
          src: /public/blog-theme.svg
          alt: Supporting card preview three
  integrations:
    title: Explain The Workflow Surface Area
    subtitle: Show grouped capabilities instead of a flat logo list when integrations need context around what they actually unlock.
    items:
      - title: Content intake
        description: Collect requests, briefs, and raw assets in one repeatable handoff.
        tools:
          - Brief Box
          - Intake Lane
          - Asset Shelf
      - title: Review and approval
        description: Give reviewers one clear preview path before the page goes live.
        tools:
          - Proof Desk
          - Checkpoint
          - Signoff Pad
      - title: Publishing workflow
        description: Move approved content into shared sections without rebuilding the page each time.
        tools:
          - Launch Queue
          - Release Desk
          - Publish Flow
      - title: Measurement follow-up
        description: Keep outcomes close to the page system so the next launch starts smarter.
        tools:
          - Signal Board
          - Metric Note
          - Outcome Log
  howItWorks:
    title: Explain The Flow In Four Steps
    subtitle: A step section works well when the page needs to make the process feel obvious and low-friction.
    items:
      - step: "01"
        title: Pick the section mix
        description: Start with the parts the page needs, such as proof, pricing, FAQs, and rollout details.
        note: Keep the first draft narrow so the message stays clear.
      - step: "02"
        title: Drop in page-ready copy
        description: Add structured content to each section instead of rewriting page layout markup by hand.
        note: Shared fields make updates easier to review later.
      - step: "03"
        title: Review the preview
        description: Check the live page with a browser capture before the content is approved.
        note: Visual checks catch spacing and hierarchy issues quickly.
      - step: "04"
        title: Reuse the pattern again
        description: Carry the same section set into the next launch, docs page, or campaign variant.
        note: Repeatable layouts reduce rework over time.
  beforeAfter:
    title: Show The Workflow Difference Clearly
    subtitle: A direct before-and-after comparison helps when the value comes from reducing manual work rather than adding one isolated feature.
    before:
      label: Before
      title: Manual page assembly with inconsistent structure
      description: Teams rebuild the same commercial sections for every launch and lose time resolving layout drift.
      bullets:
        - Copy lives in scattered notes instead of reusable blocks.
        - Reviewers spend time checking structure instead of message quality.
        - Each new page risks spacing and hierarchy regressions.
    after:
      label: After
      title: One reusable system for repeatable launch pages
      description: Shared sections turn the whole page into maintainable content instead of ad hoc markup.
      bullets:
        - Teams compose pages from a stable set of production-ready sections.
        - Reviews focus on message clarity and launch readiness.
        - The next page starts from a trusted baseline rather than zero.
  testimonialsGrid:
    title: Add Social Proof Without A Carousel
    subtitle: A static quote grid keeps the proof readable, easy to scan, and easy to maintain in source control.
    items:
      - quote: Shipping a new announcement page stopped feeling like a custom design sprint every single time.
        author: Talia Reed
        role: Content lead
        company: Example Forge
        outcome: The team now reuses the same structure across launches and reviews changes faster.
      - quote: We finally had a landing system that product, marketing, and ops could all edit without confusion.
        author: Niko Vale
        role: Product marketer
        company: Demo Harbor
        outcome: Shared sections removed most of the back-and-forth around layout decisions.
      - quote: The preview flow made small spacing fixes obvious before they reached production.
        author: Mina Hart
        role: Design systems manager
        company: Fixture House
        outcome: Reviews became shorter because the page already looked close to final when it arrived.
      - quote: We used one kit for launch, docs, and follow-up content instead of maintaining three separate page styles.
        author: Owen Pike
        role: Web operations lead
        company: Sample Works
        outcome: The team cut repeated build time and kept the whole site more consistent.
  trustBlock:
    title: Handle Trust Questions Before They Stall The Deal
    subtitle: Trust sections are useful when the buyer needs operational reassurance without leaving the landing page for separate documentation.
    items:
      - title: Review-friendly content structure
        description: Reusable sections make it easier for legal, brand, and launch reviewers to inspect the same patterns each time.
      - title: Stable publishing conventions
        description: Shared layout tokens reduce surprises when teams add pricing, proof, FAQ, or roadmap content late in the cycle.
      - title: Clear ownership across teams
        description: Structured fields help marketing, product, and web teams update the same page without stepping on each other.
      - title: Lower regression risk
        description: Screenshot checks and preview review loops make visual changes easier to verify before publishing.
  fullImage:
    title: Show One Large Product Visual
    subtitle: Use a single full-width image block when one screenshot or illustration should carry the whole section.
    image:
      src: /public/blog-vt.svg
      alt: Full width product showcase preview
  featuresTitle: Purpose-Built For Creator Workflows
  featuresSubtitle: Every section pairs visual context with practical guidance and concrete next steps.
  features:
    - title: Define And Publish Your Product Story
      subtitle: Start with structured blocks so your story is easy to scan and update over time.
      image:
        src: /public/blog-theme.svg
        alt: Product story section preview
      bullets:
        - Align headline and supporting narrative around one clear business outcome.
        - Keep section-level copy concise so visitors reach key actions faster.
        - Reuse stable content blocks across landing, docs, and blog templates.
      cta:
        label: Explore The Theme Preview
        href: /themes/slate-dark/
        variant: pr
    - title: Build Trust Through Consistent Presentation
      subtitle: Consistency across pages improves clarity for both first-time and returning visitors.
      imageRight: true
      image:
        src: /public/blog-vt.svg
        alt: Visual consistency section preview
      bullets:
        - Use shared spacing and typography tokens for every major section.
        - Present features with repeatable structure so comparison is effortless.
        - Keep CTA language and hierarchy consistent across templates.
    - title: Scale Updates Without Breaking Layout
      subtitle: Section-level partials let teams change content quickly with lower regression risk.
      image:
        src: /public/blog-partials.svg
        alt: Reusable partial section preview
      bullets:
        - Ship layout improvements once and propagate them across pages.
        - Validate updates with screenshot checks before publishing.
        - Keep authoring simple by editing YAML data instead of hardcoded markup.
  caseStudies:
    title: Show Outcome Stories In More Than One Sentence
    subtitle: Mini case-study cards give a little more context than testimonials when the page needs proof tied to a concrete workflow change.
    items:
      - company: Example Forge
        challenge: The team needed one repeatable launch page structure for multiple feature drops.
        outcome: They standardized the page flow from hero through CTA and reused it across releases.
        metric: Five launches reused the same section set in one quarter.
      - company: Demo Harbor
        challenge: Reviews kept stalling because layout and content decisions were mixed together.
        outcome: Structured sections let reviewers focus on message quality instead of rechecking page scaffolding.
        metric: Approval time dropped from days to one review cycle.
      - company: Fixture House
        challenge: Docs, campaign pages, and proof sections were drifting apart visually.
        outcome: A shared site kit brought those surfaces back under one consistent content model.
        metric: Three page types now ship from one reusable pattern library.
