      - value: "18"
        label: Reusable page blocks
        context: One shared kit covers hero, proof, pricing, roadmap, and FAQ content.
      - value: 7m
        label: Review loop
        context: Stakeholders can scan a preview and respond in one short pass.
      - value: 99.9%
        label: Publishing confidence
        context: Repeated layouts reduce last-minute regressions across site updates.
  logoCloud:
    title: Works For Customers, Partners, And Integrations
    subtitle: Use one reusable logo cloud to show customers, ecosystem partners, featured platforms, or press mentions.
