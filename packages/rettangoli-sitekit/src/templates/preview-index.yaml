- html lang="en":
    - head:
        - $partial: seo
          page: ${page}
          seo: ${seo}
          title: ${title}
        - link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.6/dist/themes/base.css":
        - link rel="stylesheet" href="/public/theme-rtgl-themes.css":
        - script src="https://cdn.jsdelivr.net/npm/construct-style-sheets-polyfill@3.1.0/dist/adoptedStyleSheets.min.js":
        - script src="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.6/dist/rettangoli-iife-ui.min.js":
        - script src="/public/rtgl-icons.js":

    - body.slate-dark:
        - 'header style="display: contents;"':
            - rtgl-view pos=abs edge=t ah=c bgc=bg:
                - $partial: top-navbar
                  brand: ${site.navbar.brand}
                  items: ${site.navbar.items}
                  ctas: ${site.navbar.ctas}
                  cta: ${site.navbar.cta}
                  github: ${site.navbar.github}
        - 'main style="display: contents;"':
            - rtgl-view w=f ah=c:
                - rtgl-view md-hide h=64:
                - rtgl-view hide md-show h=56:
                - rtgl-view w="1160" xl-w="1024" lg-w=f ph=lg pt=xl pb=xl g=xl:
                    - 'section style="display: contents;"':
                        - rtgl-view w=f g=sm:
                            - rtgl-text s=xs c=mu-fg: SITEKIT PREVIEW
                            - rtgl-text s=h1: ${title}
                            - rtgl-text c=mu-fg w="720" lg-w=f: ${description}

                    - rtgl-view w=f g=lg:
                        - 'section style="display: contents;"':
                            - rtgl-view w=f g=sm bwt=xs bc=bo pt=md:
                                - rtgl-text s=h3: Docs
                                - rtgl-view w=f g=sm:
                                    - $for item in docsPages:
                                        - rtgl-view href="${item.href}" d=v g=0 cur=p:
                                            - rtgl-text h-c=ac h-cur=p: ${item.title}
                                            - rtgl-text s=sm c=mu-fg: ${item.href}

                        - 'section style="display: contents;"':
                            - rtgl-view w=f g=sm bwt=xs bc=bo pt=md:
                                - rtgl-text s=h3: Templates
                                - rtgl-view w=f g=sm:
                                    - $for item in templatePages:
                                        - rtgl-view href="${item.href}" d=v g=0 cur=p:
                                            - rtgl-text h-c=ac h-cur=p: ${item.title}
                                            - rtgl-text s=sm c=mu-fg: ${item.href}

                        - 'section style="display: contents;"':
                            - rtgl-view w=f g=sm bwt=xs bc=bo pt=md:
                                - rtgl-text s=h3: Themes
                                - rtgl-view w=f g=sm:
                                    - $for theme in themes:
                                        - rtgl-view href="/themes/${theme.id}/" d=v g=0 cur=p:
                                            - rtgl-text h-c=ac h-cur=p: ${theme.id}
                                            - rtgl-text s=sm c=mu-fg: /themes/${theme.id}/
            - $partial: footer
              brand: ${site.footer.brand}
              columns: ${site.footer.columns}
              legalLinks: ${site.footer.legalLinks}
              copyright: ${site.footer.copyright}
        - script src="/public/mobile-nav.js":
