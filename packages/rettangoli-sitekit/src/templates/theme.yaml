- html lang="en":
    - head:
        - meta charset="utf-8":
        - meta name="viewport" content="width=device-width,initial-scale=1":
        - title: ${title}
        - link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.9/dist/themes/base.css":
        - link rel="stylesheet" href="/public/theme-rtgl-themes.css":
        - script src="https://cdn.jsdelivr.net/npm/construct-style-sheets-polyfill@3.1.0/dist/adoptedStyleSheets.min.js":
        - script src="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.9/dist/rettangoli-iife-ui.min.js":
    - body class="${themeClass}":
        - 'main style="display: contents;"':
            - rtgl-view w="f" ah="c" pv="lg" ph="lg":
                - rtgl-view w="1160" xl-w="1024" lg-w=f g="md":
                    - 'section style="display: contents;"':
                        - rtgl-view w="f" p="lg" g="sm" bw="xs" bc="bo" bgc="bg":
                            - rtgl-text s="h1": ${title}
                            - rtgl-text c="mu-fg": Verify typography, controls, surfaces, table contrast, and semantic states.
                            - rtgl-text c="mu-fg": "Active class: ${themeClass}"

                    - 'section style="display: contents;"':
                        - rtgl-view w="f" p="md" g="md" bw="xs" bc="bo" bgc="bg":
                            - rtgl-text s="xs" c="mu-fg": COLOR TOKENS
                            - rtgl-view d="h" wrap g="md":
                                - rtgl-view w="280" sm-w="f" h="128" p="md" g="sm" bw="xs" bc="bo" bgc="se":
                                    - rtgl-text s="sm": Primary
                                    - rtgl-view h="26" bw="xs" bc="bo" bgc="pr":
                                    - rtgl-text c="se-fg": foreground uses --primary-foreground.
                                - rtgl-view w="280" sm-w="f" h="128" p="md" g="sm" bw="xs" bc="bo" bgc="se":
                                    - rtgl-text s="sm": Secondary
                                    - rtgl-view h="26" bw="xs" bc="bo" bgc="se":
                                    - rtgl-text c="se-fg": foreground uses --secondary-foreground.
                                - rtgl-view w="280" sm-w="f" h="128" p="md" g="sm" bw="xs" bc="bo" bgc="se":
                                    - rtgl-text s="sm": Accent
                                    - rtgl-view h="26" bw="xs" bc="bo" bgc="ac":
                                    - rtgl-text c="se-fg": used for highlights and focus areas.
                                - rtgl-view w="280" sm-w="f" h="128" p="md" g="sm" bw="xs" bc="bo" bgc="se":
                                    - rtgl-text s="sm": Muted
                                    - rtgl-view h="26" bw="xs" bc="bo" bgc="mu":
                                    - rtgl-text c="mu-fg": muted foreground sample.

                    - 'section style="display: contents;"':
                        - rtgl-view w="f" p="md" g="sm" bw="xs" bc="bo" bgc="bg":
                            - rtgl-text s="xs" c="mu-fg": TYPOGRAPHY
                            - rtgl-text s="h1": H1 Heading Sample
                            - rtgl-text s="h2": H2 Section Heading
                            - rtgl-text s="h3": H3 Subsection Heading
                            - rtgl-text s="h4": H4 Small Heading
                            - rtgl-text: Body copy, semantic styles, and spacing should stay readable across all themes.
                            - rtgl-view bwl="md" bc="pr" pl="md" pv="xs":
                                - rtgl-text: Good themes keep hierarchy clear while preserving contrast and readability.
                            - rtgl-view g="xs":
                                - rtgl-view d="h" g="sm" av="c":
                                    - rtgl-view wh="6" bgc="mu":
                                    - rtgl-text s="sm": List item one
                                - rtgl-view d="h" g="sm" av="c":
                                    - rtgl-view wh="6" bgc="mu":
                                    - rtgl-text s="sm": List item two
                                - rtgl-view d="h" g="sm" av="c":
                                    - rtgl-view wh="6" bgc="mu":
                                    - rtgl-text s="sm": List item three
                            - rtgl-view w="f" p="md" bw="xs" bc="bo" bgc="mu" g="xs":
                                - rtgl-text s="xs" c="mu-fg": const theme = document.body.className;
                                - rtgl-text s="xs" c="mu-fg": const tokens = ["--background", "--foreground", "--primary"];
                                - rtgl-text s="xs" c="mu-fg": console.log(theme, tokens);

                    - 'section style="display: contents;"':
                        - rtgl-view w="f" p="md" g="md" bw="xs" bc="bo" bgc="bg":
                            - rtgl-text s="xs" c="mu-fg": ACTIONS AND STATES
                            - rtgl-view d="h" wrap g="sm" av="c":
                                - rtgl-button: Primary Action
                                - rtgl-button v="se": Secondary Action
                                - rtgl-button v="de": Destructive Action
                                - rtgl-button v="gh": Ghost Action
                                - rtgl-button s="sm": Small
                                - rtgl-button disabled: Disabled

                    - 'section style="display: contents;"':
                        - rtgl-view w="f" p="md" g="md" bw="xs" bc="bo" bgc="bg":
                            - rtgl-text s="xs" c="mu-fg": FORM CONTROLS
                            - rtgl-view d="h" wrap g="md":
                                - rtgl-view w="360" sm-w="f" g="xs":
                                    - rtgl-text s="xs" c="mu-fg": Name
                                    - rtgl-input w="f" value="Taylor Rivers":
                                - rtgl-view w="360" sm-w="f" g="xs":
                                    - rtgl-text s="xs" c="mu-fg": Role
                                    - rtgl-input w="f" value="Product Designer":
                                - rtgl-view w="360" sm-w="f" g="xs":
                                    - rtgl-text s="xs" c="mu-fg": Email
                                    - rtgl-input w="f" value="taylor@example.com":
                            - rtgl-view w="f" g="xs":
                                - rtgl-text s="xs" c="mu-fg": Notes
                                - rtgl-textarea w="f" rows="4" value="This textarea checks low-contrast text, input borders, and background layering.":
                            - rtgl-view d="h" wrap g="md" av="c":
                                - rtgl-checkbox checked: Email updates
                                - rtgl-checkbox: SMS alerts
                                - rtgl-checkbox checked: Monthly plan
                                - rtgl-checkbox: Annual plan
                            - rtgl-view d="h":
                                - rtgl-button: Submit
