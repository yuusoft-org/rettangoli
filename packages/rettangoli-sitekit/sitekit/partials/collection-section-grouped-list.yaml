- rtgl-view w=f g=xl pv=xl:
    - $partial: collection-section-header
      eyebrow: ${eyebrow}
      title: ${title}
      subtitle: ${subtitle}
      cta: ${cta}

    - $if groups:
        - rtgl-grid cols="2" lg-cols="1" g=xl w=f:
            - $for group in groups:
                - rtgl-view w=f h=f g=lg p=xl bw=xs bc=bo br=xl bgc=bg:
                    - rtgl-view g=sm w=f:
                        - rtgl-text s=h4 w=f: ${group.title}
                        - $if group.subtitle:
                            - rtgl-text c=mu-fg w=f: ${group.subtitle}
                    - $if group.items[0]:
                        - 'article style="display: contents;"':
                            - rtgl-view href="${group.items[0].href}" w=f h="420" lg-h="400" md-h="380" g=lg pb=lg cur=p:
                                - $if group.items[0].imageSrc:
                                    - rtgl-image w=f ar="3/2" of=cov br=lg src="${group.items[0].imageSrc}" alt="${group.items[0].imageAlt}":
                                - rtgl-view g=sm w=f h=1fg:
                                    - $if group.items[0].eyebrow:
                                        - rtgl-text s=sm c=mu-fg: ${group.items[0].eyebrow}
                                    - rtgl-text s=h4 w=f: ${group.items[0].title}
                                    - $if group.items[0].excerpt:
                                        - rtgl-text c=mu-fg w=f: ${group.items[0].excerpt}
                                      $else:
                                        - $if group.items[0].description:
                                            - rtgl-text c=mu-fg w=f: ${group.items[0].description}
                    - rtgl-view w=f g=md:
                        - $for item in group.items:
                            - $if item != group.items[0]:
                                - 'article style="display: contents;"':
                                    - rtgl-view href="${item.href}" d=h md-d=v w=f h="176" md-h="260" g=md pv=sm cur=p:
                                        - $if item.imageSrc:
                                            - rtgl-view w=120 md-w=f:
                                                - rtgl-image w=f ar="4/3" of=cov br=md src="${item.imageSrc}" alt="${item.imageAlt}":
                                        - rtgl-view w=1fg md-w=f g=xs h=1fg:
                                            - $if item.eyebrow:
                                                - rtgl-text s=sm c=mu-fg: ${item.eyebrow}
                                            - rtgl-text s=h5 w=f ellipsis: ${item.title}
                                            - rtgl-view d=h g=md av=c w=f:
                                                - $if item.author:
                                                    - rtgl-text s=sm c=mu-fg: ${item.author}
                                                - $if item.date:
                                                    - rtgl-text s=sm c=mu-fg: ${formatDate(item.date, "MMM D, YYYY")}
                                                - $if item.readingTime:
                                                    - rtgl-text s=sm c=mu-fg: ${item.readingTime}
