- rtgl-view w=f pv=xl:
    - 'header style="display: contents;"':
        - rtgl-view w=f g=lg ah=c pv=xl:
            - rtgl-text s=h2 ta=c w=f mb=md: ${title}
            - $if subtitle:
                - rtgl-text s=lg c=mu-fg ta=c w=f mt=sm mb=xl: ${subtitle}

    - $if items:
        - rtgl-grid cols="3" lg-cols="2" sm-cols="1" g=xl w=f:
            - $for item in items:
                - rtgl-view d=v w=f h=f bgc=mu bw=xs bc=bo br=xl shadow=sm p=xl lg-p=lg md-p=md sm-p=md g=lg md-g=md sm-g=md:
                    - rtgl-view g=sm:
                        - rtgl-text s=h3 w=f: ${item.title}
                        - $if item.description:
                            - rtgl-text s=md c=mu-fg w=f: ${item.description}
                    - rtgl-view g=sm:
                        - rtgl-view d=h wrap g=sm av=e:
                            - rtgl-text s=h1: ${item.price}
                            - $if item.priceSuffix:
                                - rtgl-text c=mu-fg mb=xs: ${item.priceSuffix}
                        - $if item.priceNote:
                            - rtgl-text s=sm c=mu-fg: ${item.priceNote}
                    - $if item.features:
                        - rtgl-view g=md:
                            - $for feature in item.features:
                                - rtgl-view d=h g=md av=s:
                                    - rtgl-text c=mu-fg: •
                                    - rtgl-text c=mu-fg w=1fg: ${feature}
                    - $if item.cta:
                        - rtgl-view h="1fg":
                        - $if item.cta.newTab:
                            - $if item.cta.variant:
                                - rtgl-button v="${item.cta.variant}" href="${item.cta.href}" new-tab mt=lg: ${item.cta.label}
                              $else:
                                - rtgl-button href="${item.cta.href}" new-tab mt=lg: ${item.cta.label}
                          $else:
                            - $if item.cta.variant:
                                - rtgl-button v="${item.cta.variant}" href="${item.cta.href}" mt=lg: ${item.cta.label}
                              $else:
                                - rtgl-button href="${item.cta.href}" mt=lg: ${item.cta.label}
