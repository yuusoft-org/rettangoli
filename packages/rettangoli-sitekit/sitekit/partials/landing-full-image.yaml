- rtgl-view w=f pv=xl:
    - $if title:
        - 'header style="display: contents;"':
            - rtgl-view w=f g=lg ah=c pv=xl:
                - rtgl-text s=h2 ta=c w=f mb=md: ${title}
                - $if subtitle:
                    - rtgl-text s=lg c=mu-fg ta=c w=f mt=sm mb=xl: ${subtitle}
      $else:
        - $if subtitle:
            - 'header style="display: contents;"':
                - rtgl-view w=f g=lg ah=c pv=xl:
                    - rtgl-text s=lg c=mu-fg ta=c w=f mb=xl: ${subtitle}

    - $if image:
        - $if image.src:
            - rtgl-image w=f h=560 lg-h=440 md-h=280 of=cov br=md src="${image.src}" alt="${image.alt}":
          $else:
            - rtgl-view w=f h=560 lg-h=440 md-h=280 bw=xs bc=bo bgc=se br=md ah=c av=c:
                - rtgl-text c=se-fg: Full image
