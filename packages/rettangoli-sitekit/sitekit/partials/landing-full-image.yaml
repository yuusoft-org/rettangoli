- rtgl-view w=f pv=xl:
    - $if sectionTitle:
        - 'header style="display: contents;"':
            - rtgl-view w=f g=lg ah=c pv=xl:
                - rtgl-text s=h2 ta=c w=f mb=md: ${sectionTitle}
                - $if sectionSubtitle:
                    - rtgl-text s=lg c=mu-fg ta=c w=f mt=sm mb=xl: ${sectionSubtitle}
      $else:
        - $if sectionSubtitle:
            - 'header style="display: contents;"':
                - rtgl-view w=f g=lg ah=c pv=xl:
                    - rtgl-text s=lg c=mu-fg ta=c w=f mb=xl: ${sectionSubtitle}

    - $if image:
        - $if image.src:
            - rtgl-image w=f ar="2/1" of=cov br=md src="${image.src}" alt="${image.alt}":
          $else:
            - rtgl-view w=f ar="2/1" bw=xs bc=bo bgc=se br=md ah=c av=c:
                - rtgl-text c=se-fg: Full image
