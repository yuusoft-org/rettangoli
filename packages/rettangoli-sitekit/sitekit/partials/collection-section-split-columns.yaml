- rtgl-view w=f g=xl pv=xl:
    - $partial: collection-section-header
      eyebrow: ${eyebrow}
      title: ${title}
      subtitle: ${subtitle}
      cta: ${cta}

    - $if items:
        - rtgl-grid cols="2" sm-cols="1" g=xl w=f:
            - $for column in chunk(items, 3):
                - rtgl-view w=f g=lg:
                    - $for item in column:
                        - 'article style="display: contents;"':
                            - $if item.imageSrc:
                                - rtgl-view href="${item.href}" w=f h="500" lg-h="480" md-h="440" g=lg p=lg bw=xs bc=bo br=xl bgc=se cur=p:
                                    - rtgl-image w=f ar="3/2" of=cov br=lg src="${item.imageSrc}" alt="${item.imageAlt}":
                                    - rtgl-view g=sm w=f h=1fg:
                                        - $if item.eyebrow:
                                            - rtgl-text s=sm c=mu-fg: ${item.eyebrow}
                                        - 'rtgl-text s=h4 w=f style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"':
                                            - ${item.title}
                                        - $if item.excerpt:
                                            - 'rtgl-text c=mu-fg w=f style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;"':
                                                - ${item.excerpt}
                                          $else:
                                            - $if item.description:
                                                - 'rtgl-text c=mu-fg w=f style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;"':
                                                    - ${item.description}
                                        - rtgl-view d=h g=md av=c w=f:
                                            - $if item.author:
                                                - rtgl-text s=sm c=mu-fg: ${item.author}
                                            - $if item.date:
                                                - rtgl-text s=sm c=mu-fg: ${formatDate(item.date, "MMM D, YYYY")}
                                            - $if item.readingTime:
                                                - rtgl-text s=sm c=mu-fg: ${item.readingTime}
                              $else:
                                - rtgl-view href="${item.href}" w=f h="500" lg-h="480" md-h="440" g=sm p=lg bw=xs bc=bo br=xl cur=p:
                                    - $if item.eyebrow:
                                        - rtgl-text s=sm c=mu-fg: ${item.eyebrow}
                                    - 'rtgl-text s=h4 w=f style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"':
                                        - ${item.title}
                                    - $if item.excerpt:
                                        - 'rtgl-text c=mu-fg w=f style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;"':
                                            - ${item.excerpt}
                                      $else:
                                        - $if item.description:
                                            - 'rtgl-text c=mu-fg w=f style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;"':
                                                - ${item.description}
                                    - rtgl-view d=h g=md av=c w=f:
                                        - $if item.author:
                                            - rtgl-text s=sm c=mu-fg: ${item.author}
                                        - $if item.date:
                                            - rtgl-text s=sm c=mu-fg: ${formatDate(item.date, "MMM D, YYYY")}
                                        - $if item.readingTime:
                                            - rtgl-text s=sm c=mu-fg: ${item.readingTime}
