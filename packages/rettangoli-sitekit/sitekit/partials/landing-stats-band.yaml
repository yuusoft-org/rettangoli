- rtgl-view w=f pv=xl g=xl:
    - $if title:
        - 'header style="display: contents;"':
            - rtgl-view w=f g=lg ah=c pv=xl:
                - rtgl-text s=h2 ta=c w=f mb=md: ${title}
                - $if subtitle:
                    - rtgl-text s=lg c=mu-fg ta=c w=f mt=sm mb=xl: ${subtitle}

    - $if items:
        - rtgl-view w=f bgc=mu bw=xs bc=bo br=xl p=xl lg-p=lg md-p=md:
            - rtgl-grid cols="4" lg-cols="2" sm-cols="1" g=xl w=f:
                - $for item in items:
                    - 'article style="display: contents;"':
                        - rtgl-view w=f g=md ah=c av=c:
                            - rtgl-text s=h1 ta=c: ${item.value}
                            - rtgl-text s=md ta=c: ${item.label}
                            - $if item.context:
                                - rtgl-text s=sm c=mu-fg ta=c: ${item.context}
    - rtgl-view h=80:
