- rtgl-view w=f pv=xl g=xl:
    - 'header style="display: contents;"':
        - rtgl-view w=f g=lg ah=c pv=xl:
            - rtgl-text s=h2 ta=c w=f mb=md: ${title}
            - $if subtitle:
                - rtgl-text s=lg c=mu-fg ta=c w=f mt=sm mb=xl: ${subtitle}

    - $if items:
        - rtgl-grid cols="3" lg-cols="2" sm-cols="1" g=xl w=f:
            - $for item in items:
                - 'article style="display: contents;"':
                    - rtgl-view w=f h=f p=xl g=md bgc=mu bw=xs bc=bo br=xl:
                        - rtgl-text s=sm c=mu-fg: ${item.company}
                        - rtgl-view g=xs:
                            - rtgl-text s=sm fw=bold: Challenge
                            - rtgl-text c=mu-fg: ${item.challenge}
                        - rtgl-view g=xs:
                            - rtgl-text s=sm fw=bold: Outcome
                            - rtgl-text c=mu-fg: ${item.outcome}
                        - rtgl-view w=f bwt=xs bc=bo pt=md:
                            - rtgl-text s=sm: ${item.metric}
