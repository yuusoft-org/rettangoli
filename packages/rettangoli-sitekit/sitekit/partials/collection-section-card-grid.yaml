- rtgl-view w=f g=xl pv=xl:
    - $partial: collection-section-header
      eyebrow: ${eyebrow}
      title: ${title}
      subtitle: ${subtitle}
      cta: ${cta}

    - $if items:
        - rtgl-grid cols="3" lg-cols="2" sm-cols="1" g=xl w=f:
            - $for item in items:
                - 'article style="display: contents;"':
                    - rtgl-view href="${item.href}" w=f h="500" lg-h="480" md-h="460" p=xl g=lg bgc=se bw=xs bc=bo br=xl cur=p:
                        - $if item.imageSrc:
                            - rtgl-image w=f h=224 lg-h=212 of=cov br=md src="${item.imageSrc}" alt="${item.imageAlt}":
                          $else:
                            - rtgl-view w=f h=224 lg-h=212 bw=xs bc=bo bgc=bg br=md ah=c av=c:
                                - rtgl-text c=mu-fg: Collection image
                        - rtgl-view g=md w=f h=1fg:
                            - $if item.eyebrow:
                                - rtgl-text s=sm c=mu-fg: ${item.eyebrow}
                            - rtgl-view g=sm w=f h=1fg:
                                - 'rtgl-text s=h4 w=f style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"':
                                    - ${item.title}
                                - $if item.excerpt:
                                    - 'rtgl-text c=mu-fg w=f style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"':
                                        - ${item.excerpt}
                                  $else:
                                    - $if item.description:
                                        - 'rtgl-text c=mu-fg w=f style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"':
                                            - ${item.description}
                            - rtgl-view d=h wrap g=md av=c w=f:
                                - $if item.author:
                                    - rtgl-text s=sm c=mu-fg: ${item.author}
                                - $if item.date:
                                    - rtgl-text s=sm c=mu-fg: ${formatDate(item.date, "MMM D, YYYY")}
                                - $if item.readingTime:
                                    - rtgl-text s=sm c=mu-fg: ${item.readingTime}
