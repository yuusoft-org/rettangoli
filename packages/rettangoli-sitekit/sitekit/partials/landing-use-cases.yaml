- rtgl-view w=f pv=xl g=xl:
    - 'header style="display: contents;"':
        - rtgl-view w=f g=lg ah=c pv=xl:
            - rtgl-text s=h2 ta=c w=f mb=md: ${title}
            - $if subtitle:
                - rtgl-text s=lg c=mu-fg ta=c w=f mt=sm mb=xl: ${subtitle}

    - $if items:
        - rtgl-grid cols="3" lg-cols="2" sm-cols="1" g=xl w=f:
            - $for item in items:
                - 'article style="display: contents;"':
                    - rtgl-view w=f h=f p=xl g=md bw=xs bc=bo bgc=se br=xl:
                        - $if item.eyebrow:
                            - rtgl-text s=sm c=mu-fg: ${item.eyebrow}
                        - rtgl-text s=h3: ${item.title}
                        - $if item.pain:
                            - rtgl-view g=xs:
                                - rtgl-text s=sm fw=bold: Pain point
                                - rtgl-text c=mu-fg: ${item.pain}
                        - $if item.fit:
                            - rtgl-view g=xs:
                                - rtgl-text s=sm fw=bold: Why it fits
                                - rtgl-text c=mu-fg: ${item.fit}
