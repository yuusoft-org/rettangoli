- html lang="en":
    - head:
        - $partial: seo
          page: ${page}
          seo: ${seo}
          title: ${title}
        - link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.9/dist/themes/base.css":
        - link rel="stylesheet" href="/public/theme-rtgl-themes.css":
        - script src="https://cdn.jsdelivr.net/npm/construct-style-sheets-polyfill@3.1.0/dist/adoptedStyleSheets.min.js":
        - script src="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.9/dist/rettangoli-iife-ui.min.js":
        - script src="/public/rtgl-icons.js":

    - body.slate-dark:
        - 'header style="display: contents;"':
            - rtgl-view pos=abs edge=t ah=c bgc=bg:
                - $partial: top-navbar
                  brand: ${site.navbar.brand}
                  items: ${site.navbar.items}
                  ctas: ${site.navbar.ctas}
                  cta: ${site.navbar.cta}
                  github: ${site.navbar.github}
        - 'main style="display: contents;"':
            - rtgl-view w=f ah=c:
                - rtgl-view md-hide h=64:
                - rtgl-view hide md-show h=56:
                - rtgl-view w="1160" xl-w="1024" lg-w=f ph=lg pt=lg pb=xl g=xl:
                    - 'section style="display: contents;"':
                        - $partial: landing-hero
                          title: ${landing.title}
                          subtitle: ${landing.subtitle}
                          actions: ${landing.actions}
                          image: ${landing.image}

                    - $if landing.statsBand:
                        - 'section style="display: contents;"':
                            - $partial: landing-stats-band
                              title: ${landing.statsBand.title}
                              subtitle: ${landing.statsBand.subtitle}
                              items: ${landing.statsBand.items}

                    - $if landing.logoCloud:
                        - 'section style="display: contents;"':
                            - $partial: landing-logo-cloud
                              title: ${landing.logoCloud.title}
                              subtitle: ${landing.logoCloud.subtitle}
                              items: ${landing.logoCloud.items}

                    - $if landing.useCases:
                        - 'section style="display: contents;"':
                            - $partial: landing-use-cases
                              title: ${landing.useCases.title}
                              subtitle: ${landing.useCases.subtitle}
                              items: ${landing.useCases.items}

                    - $if landing.iconFeatures:
                        - 'section style="display: contents;"':
                            - $partial: landing-icon-features
                              title: ${landing.iconFeatures.title}
                              subtitle: ${landing.iconFeatures.subtitle}
                              items: ${landing.iconFeatures.items}

                    - $if landing.featureMosaic:
                        - 'section style="display: contents;"':
                            - $partial: landing-feature-mosaic
                              title: ${landing.featureMosaic.title}
                              subtitle: ${landing.featureMosaic.subtitle}
                              lead: ${landing.featureMosaic.lead}
                              items: ${landing.featureMosaic.items}

                    - $if landing.integrations:
                        - 'section style="display: contents;"':
                            - $partial: landing-integrations
                              title: ${landing.integrations.title}
                              subtitle: ${landing.integrations.subtitle}
                              items: ${landing.integrations.items}

                    - $if landing.howItWorks:
                        - 'section style="display: contents;"':
                            - $partial: landing-how-it-works
                              title: ${landing.howItWorks.title}
                              subtitle: ${landing.howItWorks.subtitle}
                              items: ${landing.howItWorks.items}

                    - $if landing.beforeAfter:
                        - 'section style="display: contents;"':
                            - $partial: landing-before-after
                              title: ${landing.beforeAfter.title}
                              subtitle: ${landing.beforeAfter.subtitle}
                              before: ${landing.beforeAfter.before}
                              after: ${landing.beforeAfter.after}

                    - $if landing.testimonialsGrid:
                        - 'section style="display: contents;"':
                            - $partial: landing-testimonials-grid
                              title: ${landing.testimonialsGrid.title}
                              subtitle: ${landing.testimonialsGrid.subtitle}
                              items: ${landing.testimonialsGrid.items}

                    - $if landing.trustBlock:
                        - 'section style="display: contents;"':
                            - $partial: landing-trust-block
                              title: ${landing.trustBlock.title}
                              subtitle: ${landing.trustBlock.subtitle}
                              items: ${landing.trustBlock.items}

                    - $if landing.fullImage:
                        - 'section style="display: contents;"':
                            - $partial: landing-full-image
                              sectionTitle: ${landing.fullImage.title}
                              sectionSubtitle: ${landing.fullImage.subtitle}
                              image: ${landing.fullImage.image}

                    - $if landing.features:
                        - 'section style="display: contents;"':
                            - $partial: landing-features-section
                              title: ${landing.featuresTitle}
                              subtitle: ${landing.featuresSubtitle}
                              items: ${landing.features}

                    - $if landing.caseStudies:
                        - 'section style="display: contents;"':
                            - $partial: landing-case-studies
                              title: ${landing.caseStudies.title}
                              subtitle: ${landing.caseStudies.subtitle}
                              items: ${landing.caseStudies.items}

                    - $if landing.pricing:
                        - 'section style="display: contents;"':
                            - $partial: landing-pricing
                              title: ${landing.pricing.title}
                              subtitle: ${landing.pricing.subtitle}
                              items: ${landing.pricing.items}

                    - $if landing.pricingComparison:
                        - 'section style="display: contents;"':
                            - $partial: landing-pricing-comparison
                              title: ${landing.pricingComparison.title}
                              subtitle: ${landing.pricingComparison.subtitle}
                              plans: ${landing.pricingComparison.plans}
                              rows: ${landing.pricingComparison.rows}

                    - $if landing.roadmap:
                        - 'section style="display: contents;"':
                            - $partial: landing-roadmap
                              title: ${landing.roadmap.title}
                              subtitle: ${landing.roadmap.subtitle}
                              items: ${landing.roadmap.items}

                    - $if landing.faq:
                        - 'section style="display: contents;"':
                            - $partial: landing-faq
                              sectionTitle: ${landing.faq.title}
                              sectionSubtitle: ${landing.faq.subtitle}
                              items: ${landing.faq.items}

                    - $if landing.cta:
                        - 'section style="display: contents;"':
                            - $partial: landing-cta
                              svg: ${landing.cta.svg}
                              title: ${landing.cta.title}
                              subtitle: ${landing.cta.subtitle}
                              cta: ${landing.cta.cta}
            - $partial: footer
              brand: ${site.footer.brand}
              columns: ${site.footer.columns}
              legalLinks: ${site.footer.legalLinks}
              copyright: ${site.footer.copyright}
        - script src="/public/mobile-nav.js":
