- html lang="en":
    - head:
        - $partial: seo
          page: ${page}
          seo: ${seo}
          title: ${title}
        - link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.9/dist/themes/base.css":
        - link rel="stylesheet" href="/public/theme-rtgl-themes.css":
        - script src="https://cdn.jsdelivr.net/npm/construct-style-sheets-polyfill@3.1.0/dist/adoptedStyleSheets.min.js":
        - script src="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.9/dist/rettangoli-iife-ui.min.js":
        - script src="/public/rtgl-icons.js":

    - body.slate-dark:
        - 'header style="display: contents;"':
            - rtgl-view pos=abs edge=t ah=c bgc=bg:
                - $partial: top-navbar
                  brand: ${site.navbar.brand}
                  items: ${site.navbar.items}
                  ctas: ${site.navbar.ctas}
                  cta: ${site.navbar.cta}
                  github: ${site.navbar.github}
        - 'main style="display: contents;"':
            - rtgl-view w=f ah=c:
                - rtgl-view md-hide h=64:
                - rtgl-view hide md-show h=56:
                - rtgl-view w="1160" xl-w="1024" lg-w=f ph=lg pt=lg pb=xl g=xl:
                    - 'section style="display: contents;"':
                        - $partial: landing-hero
                          title: ${landing.title}
                          subtitle: ${landing.subtitle}
                          actions: ${landing.actions}
                          image: ${landing.image}

                    - $if landing.logoCloud:
                        - 'section style="display: contents;"':
                            - $partial: landing-logo-cloud
                              title: ${landing.logoCloud.title}
                              subtitle: ${landing.logoCloud.subtitle}
                              items: ${landing.logoCloud.items}

                    - $if landing.iconFeatures:
                        - 'section style="display: contents;"':
                            - $partial: landing-icon-features
                              title: ${landing.iconFeatures.title}
                              subtitle: ${landing.iconFeatures.subtitle}
                              items: ${landing.iconFeatures.items}

                    - $if landing.fullImage:
                        - 'section style="display: contents;"':
                            - $partial: landing-full-image
                              sectionTitle: ${landing.fullImage.title}
                              sectionSubtitle: ${landing.fullImage.subtitle}
                              image: ${landing.fullImage.image}

                    - 'section style="display: contents;"':
                        - $partial: landing-features-section
                          title: ${landing.featuresTitle}
                          subtitle: ${landing.featuresSubtitle}
                          items: ${landing.features}

                    - $if landing.faq:
                        - 'section style="display: contents;"':
                            - $partial: landing-faq
                              sectionTitle: ${landing.faq.title}
                              sectionSubtitle: ${landing.faq.subtitle}
                              items: ${landing.faq.items}

                    - $if landing.cta:
                        - 'section style="display: contents;"':
                            - $partial: landing-cta
                              svg: ${landing.cta.svg}
                              title: ${landing.cta.title}
                              subtitle: ${landing.cta.subtitle}
                              cta: ${landing.cta.cta}
            - $partial: footer
              brand: ${site.footer.brand}
              columns: ${site.footer.columns}
              legalLinks: ${site.footer.legalLinks}
              copyright: ${site.footer.copyright}
        - script src="/public/mobile-nav.js":
