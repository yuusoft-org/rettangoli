- html lang="en":
    - head:
        - $partial: seo
          page: ${page}
          seo: ${seo}
          title: ${title}
        - link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.7/dist/themes/base.css":
        - link rel="stylesheet" href="/public/theme-rtgl-themes.css":
        - script src="https://cdn.jsdelivr.net/npm/construct-style-sheets-polyfill@3.1.0/dist/adoptedStyleSheets.min.js":
        - script src="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.7/dist/rettangoli-iife-ui.min.js":
        - script src="/public/rtgl-icons.js":

    - body.slate-dark:
        - rtgl-view pos=abs edge=t ah=c bgc=bg:
            - $partial: top-navbar
              brand: ${site.navbar.brand}
              items: ${site.navbar.items}
              ctas: ${site.navbar.ctas}
              cta: ${site.navbar.cta}
              github: ${site.navbar.github}
        - rtgl-view w=f ah=c:
            - rtgl-view md-hide h=64:
            - rtgl-view hide md-show h=56:
            - rtgl-view w="1160" xl-w="1024" lg-w=f ph=lg pt=lg pb=xl g=lg:
                - rtgl-view g=lg ah=c av=c w=f md-h=260 h=340:
                    - rtgl-text s=h1 ta=c w=f: ${title}
                    - rtgl-text c=mu-fg mt=md mb=lg ta=c w=f: ${description}

                - rtgl-grid cols="3" lg-cols="2" sm-cols="1" g=xl w=f:
                    - $for post in posts:
                        - rtgl-view href="${post.href}" w=f h=f p=xl bgc=se bw=xs bc=bo g=xl cur=p:
                            - $if post.imageSrc:
                                - rtgl-image w=f src="${post.imageSrc}" alt="${post.imageAlt}":
                            - rtgl-text s=h4 w=f: ${post.title}
                            - rtgl-view d=h g=sm av=c w=f:
                                - rtgl-text s=sm c=mu-fg: ${post.author}
                                - rtgl-view w=1fg:
                                - rtgl-text s=sm c=mu-fg ta=r: ${formatDate(post.date, "MM/DD/YYYY")}
            - $partial: footer
              brand: ${site.footer.brand}
              columns: ${site.footer.columns}
              legalLinks: ${site.footer.legalLinks}
              copyright: ${site.footer.copyright}
        - script src="/public/mobile-nav.js":
