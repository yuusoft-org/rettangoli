- html lang="en":
    - head:
        - $partial: seo
          page: ${page}
          seo: ${seo}
          title: ${title}
        - link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.19/dist/themes/base.css":
        - link rel="stylesheet" href="${default(themeCssHref, '/public/theme-rtgl-themes.css')}":
        - script src="https://cdn.jsdelivr.net/npm/construct-style-sheets-polyfill@3.1.0/dist/adoptedStyleSheets.min.js":
        - script src="https://cdn.jsdelivr.net/npm/@rettangoli/ui@1.0.19/dist/rettangoli-iife-ui.min.js":
        - script src="/public/rtgl-icons.js":

    - body class="${default(themeBodyClass, 'slate-dark')}":
        - 'header style="display: contents;"':
            - rtgl-view pos=abs edge=t ah=c bgc=bg:
                - $partial: top-navbar
                  brand: ${site.navbar.brand}
                  items: ${site.navbar.items}
                  ctas: ${site.navbar.ctas}
                  cta: ${site.navbar.cta}
                  github: ${site.navbar.github}
        - 'main style="display: contents;"':
            - rtgl-view w=f ah=c:
                - rtgl-view md-hide h=64:
                - rtgl-view hide md-show h=56:
                - rtgl-view w="1160" xl-w="1024" lg-w=f ph=lg pt=lg pb=xl g=lg:
                    - 'section style="display: contents;"':
                        - rtgl-view g=lg ah=c av=c w=f md-h=260 h=340:
                            - rtgl-text s=h1 ta=c w=f: ${title}
                            - rtgl-text c=mu-fg mt=md mb=lg ta=c w=f: ${description}

                    - 'section aria-label="Collections" style="display: contents;"':
                        - $if sections:
                            - rtgl-view w=f:
                                - $for section in sections:
                                    - $if section.layout == "featured-list":
                                        - $partial: collection-section-featured-list
                                          eyebrow: ${section.eyebrow}
                                          title: ${section.title}
                                          subtitle: ${section.subtitle}
                                          cta: ${section.cta}
                                          lead: ${section.lead}
                                          items: ${section.items}
                                      $else:
                                        - $if section.layout == "compact-list":
                                            - $partial: collection-section-compact-list
                                              eyebrow: ${section.eyebrow}
                                              title: ${section.title}
                                              subtitle: ${section.subtitle}
                                              cta: ${section.cta}
                                              items: ${section.items}
                                          $else:
                                            - $if section.layout == "split-columns":
                                                - $partial: collection-section-split-columns
                                                  eyebrow: ${section.eyebrow}
                                                  title: ${section.title}
                                                  subtitle: ${section.subtitle}
                                                  cta: ${section.cta}
                                                  items: ${section.items}
                                              $else:
                                                - $if section.layout == "grouped-list":
                                                    - $partial: collection-section-grouped-list
                                                      eyebrow: ${section.eyebrow}
                                                      title: ${section.title}
                                                      subtitle: ${section.subtitle}
                                                      cta: ${section.cta}
                                                      groups: ${section.groups}
                                                  $else:
                                                    - $partial: collection-section-card-grid
                                                      eyebrow: ${section.eyebrow}
                                                      title: ${section.title}
                                                      subtitle: ${section.subtitle}
                                                      cta: ${section.cta}
                                                      items: ${section.items}
                          $else:
                            - $partial: collection-section-card-grid
                              title: Latest Articles
                              subtitle: Keep the legacy posts array for a single-section archive.
                              items: ${posts}
            - $partial: footer
              brand: ${site.footer.brand}
              columns: ${site.footer.columns}
              legalLinks: ${site.footer.legalLinks}
              copyright: ${site.footer.copyright}
        - script src="/public/mobile-nav.js":
