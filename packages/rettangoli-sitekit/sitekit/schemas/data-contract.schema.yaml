$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cdn.jsdelivr.net/npm/@rettangoli/sitekit@<version>/sitekit/schemas/data-contract.schema.yaml
title: Rettangoli Sites Template And Partial Data Contracts
description: Data contracts for built-in templates and partials published under sitekit/templates and sitekit/partials.
type: object
additionalProperties: false
properties:
  templates:
    type: object
    additionalProperties: false
    properties:
      base:
        $ref: '#/$defs/template.base'
      docs:
        $ref: '#/$defs/template.docs'
      landing-features:
        $ref: '#/$defs/template.landingFeatures'
      blog-article-list:
        $ref: '#/$defs/template.blogArticleList'
      blog-article:
        $ref: '#/$defs/template.blogArticle'
  partials:
    type: object
    additionalProperties: false
    properties:
      seo:
        $ref: '#/$defs/partial.seo'
      navbar:
        $ref: '#/$defs/partial.navbar'
      mobile-nav:
        $ref: '#/$defs/partial.mobileNav'
      docs-sidebar:
        $ref: '#/$defs/partial.docsSidebar'
      docs-mobile-nav:
        $ref: '#/$defs/partial.docsMobileNav'
      top-navbar:
        $ref: '#/$defs/partial.topNavbar'
      landing-hero:
        $ref: '#/$defs/partial.landingHero'
      landing-stats-band:
        $ref: '#/$defs/partial.landingStatsBand'
      landing-logo-cloud:
        $ref: '#/$defs/partial.landingLogoCloud'
      landing-use-cases:
        $ref: '#/$defs/partial.landingUseCases'
      landing-icon-features:
        $ref: '#/$defs/partial.landingIconFeatures'
      landing-feature-mosaic:
        $ref: '#/$defs/partial.landingFeatureMosaic'
      landing-integrations:
        $ref: '#/$defs/partial.landingIntegrations'
      landing-how-it-works:
        $ref: '#/$defs/partial.landingHowItWorks'
      landing-before-after:
        $ref: '#/$defs/partial.landingBeforeAfter'
      landing-testimonials-grid:
        $ref: '#/$defs/partial.landingTestimonialsGrid'
      landing-trust-block:
        $ref: '#/$defs/partial.landingTrustBlock'
      landing-full-image:
        $ref: '#/$defs/partial.landingFullImage'
      landing-case-studies:
        $ref: '#/$defs/partial.landingCaseStudies'
      landing-pricing:
        $ref: '#/$defs/partial.landingPricing'
      landing-pricing-comparison:
        $ref: '#/$defs/partial.landingPricingComparison'
      landing-roadmap:
        $ref: '#/$defs/partial.landingRoadmap'
      landing-faq:
        $ref: '#/$defs/partial.landingFaq'
      landing-features-section:
        $ref: '#/$defs/partial.landingFeaturesSection'
      landing-cta:
        $ref: '#/$defs/partial.landingCta'
      footer:
        $ref: '#/$defs/partial.footer'
$defs:
  types.nonEmptyString:
    type: string
    minLength: 1
  types.urlString:
    type: string
    minLength: 1
  types.link:
    type: object
    additionalProperties: true
    required:
    - label
    - href
    properties:
      label:
        $ref: '#/$defs/types.nonEmptyString'
      href:
        $ref: '#/$defs/types.urlString'
      target:
        $ref: '#/$defs/types.nonEmptyString'
  types.brand:
    type: object
    additionalProperties: true
    required:
    - label
    - href
    properties:
      label:
        $ref: '#/$defs/types.nonEmptyString'
      href:
        $ref: '#/$defs/types.urlString'
  types.cta:
    type: object
    additionalProperties: true
    required:
    - label
    - href
    properties:
      label:
        $ref: '#/$defs/types.nonEmptyString'
      href:
        $ref: '#/$defs/types.urlString'
      variant:
        $ref: '#/$defs/types.nonEmptyString'
      target:
        $ref: '#/$defs/types.nonEmptyString'
      newTab:
        type: boolean
  types.docsItem:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      id:
        $ref: '#/$defs/types.nonEmptyString'
      title:
        $ref: '#/$defs/types.nonEmptyString'
      href:
        $ref: '#/$defs/types.urlString'
      type:
        $ref: '#/$defs/types.nonEmptyString'
      items:
        type: array
        items:
          $ref: '#/$defs/types.docsItem'
  types.docsHeader:
    $ref: '#/$defs/types.brand'
  types.docsModel:
    type: object
    additionalProperties: true
    required:
    - header
    - items
    properties:
      header:
        $ref: '#/$defs/types.docsHeader'
      items:
        type: array
        items:
          $ref: '#/$defs/types.docsItem'
  types.seoModel:
    type: object
    additionalProperties: true
    required:
    - title
    - description
    - ogSiteName
    - ogType
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        $ref: '#/$defs/types.nonEmptyString'
      ogSiteName:
        $ref: '#/$defs/types.nonEmptyString'
      ogType:
        $ref: '#/$defs/types.nonEmptyString'
  types.pageModel:
    type: object
    additionalProperties: true
    required:
    - url
    properties:
      url:
        $ref: '#/$defs/types.urlString'
  types.navbarModel:
    type: object
    additionalProperties: true
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      brand:
        $ref: '#/$defs/types.brand'
      items:
        type: array
        items:
          $ref: '#/$defs/types.link'
      ctas:
        type: array
        items:
          $ref: '#/$defs/types.cta'
      cta:
        $ref: '#/$defs/types.cta'
      github:
        type: object
        additionalProperties: true
        required:
        - href
        properties:
          href:
            $ref: '#/$defs/types.urlString'
  types.footerModel:
    type: object
    additionalProperties: true
    required:
    - brand
    - columns
    - legalLinks
    - copyright
    properties:
      brand:
        type: object
        additionalProperties: true
        required:
        - label
        - tagline
        properties:
          label:
            $ref: '#/$defs/types.nonEmptyString'
          tagline:
            $ref: '#/$defs/types.nonEmptyString'
      columns:
        type: array
        items:
          type: object
          additionalProperties: true
          required:
          - title
          - links
          properties:
            title:
              $ref: '#/$defs/types.nonEmptyString'
            links:
              type: array
              items:
                $ref: '#/$defs/types.link'
      legalLinks:
        type: array
        items:
          $ref: '#/$defs/types.link'
      copyright:
        $ref: '#/$defs/types.nonEmptyString'
  types.siteModel:
    type: object
    additionalProperties: true
    required:
    - baseUrl
    properties:
      baseUrl:
        $ref: '#/$defs/types.urlString'
      navbar:
        $ref: '#/$defs/types.navbarModel'
      footer:
        $ref: '#/$defs/types.footerModel'
  types.landingAction:
    $ref: '#/$defs/types.cta'
  types.landingImage:
    type: object
    additionalProperties: true
    properties:
      src:
        $ref: '#/$defs/types.urlString'
      alt:
        type: string
  types.landingLogoItem:
    type: object
    additionalProperties: true
    required:
    - src
    - alt
    properties:
      src:
        $ref: '#/$defs/types.urlString'
      alt:
        $ref: '#/$defs/types.nonEmptyString'
      href:
        $ref: '#/$defs/types.urlString'
      target:
        $ref: '#/$defs/types.nonEmptyString'
  types.landingLogoCloudModel:
    type: object
    additionalProperties: true
    required:
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingLogoItem'
  types.landingIconFeatureItem:
    type: object
    additionalProperties: true
    required:
    - title
    anyOf:
    - required:
      - icon
    - required:
      - image
    properties:
      icon:
        $ref: '#/$defs/types.nonEmptyString'
      image:
        $ref: '#/$defs/types.landingImage'
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        type: string
  types.landingIconFeaturesModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingIconFeatureItem'
  types.landingFullImageModel:
    type: object
    additionalProperties: true
    required:
    - image
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      image:
        $ref: '#/$defs/types.landingImage'
  types.landingStatItem:
    type: object
    additionalProperties: true
    required:
    - value
    - label
    properties:
      value:
        $ref: '#/$defs/types.nonEmptyString'
      label:
        $ref: '#/$defs/types.nonEmptyString'
      context:
        type: string
  types.landingStatsBandModel:
    type: object
    additionalProperties: true
    required:
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingStatItem'
  types.landingUseCaseItem:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      eyebrow:
        type: string
      title:
        $ref: '#/$defs/types.nonEmptyString'
      pain:
        type: string
      fit:
        type: string
  types.landingUseCasesModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingUseCaseItem'
  types.landingPricingItem:
    type: object
    additionalProperties: true
    required:
    - title
    - price
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        type: string
      price:
        $ref: '#/$defs/types.nonEmptyString'
      priceSuffix:
        type: string
      priceNote:
        type: string
      size:
        type: string
        enum: [sm, md, lg]
      features:
        type: array
        items:
          type: string
      cta:
        $ref: '#/$defs/types.cta'
  types.landingPricingModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingPricingItem'
  types.landingFeatureMosaicLead:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        type: string
      image:
        $ref: '#/$defs/types.landingImage'
      cta:
        $ref: '#/$defs/types.cta'
  types.landingFeatureMosaicItem:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        type: string
      image:
        $ref: '#/$defs/types.landingImage'
  types.landingFeatureMosaicModel:
    type: object
    additionalProperties: true
    required:
    - title
    - lead
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      lead:
        $ref: '#/$defs/types.landingFeatureMosaicLead'
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingFeatureMosaicItem'
  types.landingIntegrationItem:
    type: object
    additionalProperties: true
    required:
    - title
    - tools
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        type: string
      tools:
        type: array
        items:
          type: string
  types.landingIntegrationsModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingIntegrationItem'
  types.landingHowItWorksItem:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      step:
        type: string
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        type: string
      note:
        type: string
  types.landingHowItWorksModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingHowItWorksItem'
  types.landingBeforeAfterSide:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      label:
        type: string
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        type: string
      bullets:
        type: array
        items:
          type: string
  types.landingBeforeAfterModel:
    type: object
    additionalProperties: true
    required:
    - title
    - before
    - after
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      before:
        $ref: '#/$defs/types.landingBeforeAfterSide'
      after:
        $ref: '#/$defs/types.landingBeforeAfterSide'
  types.landingTestimonialItem:
    type: object
    additionalProperties: true
    required:
    - quote
    - author
    properties:
      image:
        $ref: '#/$defs/types.landingImage'
      quote:
        $ref: '#/$defs/types.nonEmptyString'
      author:
        $ref: '#/$defs/types.nonEmptyString'
      role:
        type: string
      company:
        type: string
      outcome:
        type: string
  types.landingTestimonialsGridModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingTestimonialItem'
  types.landingTrustItem:
    type: object
    additionalProperties: true
    required:
    - title
    - description
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        $ref: '#/$defs/types.nonEmptyString'
  types.landingTrustBlockModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingTrustItem'
  types.landingCaseStudyItem:
    type: object
    additionalProperties: true
    required:
    - company
    - challenge
    - outcome
    - metric
    properties:
      company:
        $ref: '#/$defs/types.nonEmptyString'
      challenge:
        $ref: '#/$defs/types.nonEmptyString'
      outcome:
        $ref: '#/$defs/types.nonEmptyString'
      metric:
        $ref: '#/$defs/types.nonEmptyString'
  types.landingCaseStudiesModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingCaseStudyItem'
  types.landingPricingComparisonPlan:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      price:
        $ref: '#/$defs/types.nonEmptyString'
      priceSuffix:
        type: string
      note:
        type: string
      cta:
        $ref: '#/$defs/types.cta'
  types.landingPricingComparisonCell:
    type: object
    additionalProperties: true
    properties:
      label:
        type: string
      included:
        type: boolean
  types.landingPricingComparisonRow:
    type: object
    additionalProperties: true
    required:
    - label
    - cells
    properties:
      label:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        type: string
      cells:
        type: array
        items:
          $ref: '#/$defs/types.landingPricingComparisonCell'
  types.landingPricingComparisonModel:
    type: object
    additionalProperties: true
    required:
    - title
    - plans
    - rows
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      plans:
        type: array
        items:
          $ref: '#/$defs/types.landingPricingComparisonPlan'
      rows:
        type: array
        items:
          $ref: '#/$defs/types.landingPricingComparisonRow'
  types.landingRoadmapItem:
    type: object
    additionalProperties: true
    required:
    - phase
    - title
    - description
    properties:
      phase:
        $ref: '#/$defs/types.nonEmptyString'
      title:
        $ref: '#/$defs/types.nonEmptyString'
      description:
        $ref: '#/$defs/types.nonEmptyString'
  types.landingRoadmapModel:
    type: object
    additionalProperties: true
    required:
    - title
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingRoadmapItem'
  types.landingFaqItem:
    type: object
    additionalProperties: true
    required:
    - question
    - answer
    properties:
      question:
        $ref: '#/$defs/types.nonEmptyString'
      answer:
        $ref: '#/$defs/types.nonEmptyString'
  types.landingFaqModel:
    type: object
    additionalProperties: true
    required:
    - items
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      items:
        type: array
        items:
          $ref: '#/$defs/types.landingFaqItem'
  types.landingFeatureItem:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      imageRight:
        type: boolean
      image:
        $ref: '#/$defs/types.landingImage'
      bullets:
        type: array
        items:
          type: string
      cta:
        $ref: '#/$defs/types.cta'
  types.landingCtaModel:
    type: object
    additionalProperties: true
    required:
    - title
    properties:
      svg:
        type: string
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      cta:
        $ref: '#/$defs/types.cta'
  types.landingModel:
    type: object
    additionalProperties: true
    required:
    - title
    anyOf:
    - not:
        required:
        - features
    - required:
      - featuresTitle
      - features
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      subtitle:
        type: string
      actions:
        type: array
        items:
          $ref: '#/$defs/types.landingAction'
      image:
        $ref: '#/$defs/types.landingImage'
      statsBand:
        $ref: '#/$defs/types.landingStatsBandModel'
      logoCloud:
        $ref: '#/$defs/types.landingLogoCloudModel'
      useCases:
        $ref: '#/$defs/types.landingUseCasesModel'
      iconFeatures:
        $ref: '#/$defs/types.landingIconFeaturesModel'
      featureMosaic:
        $ref: '#/$defs/types.landingFeatureMosaicModel'
      integrations:
        $ref: '#/$defs/types.landingIntegrationsModel'
      howItWorks:
        $ref: '#/$defs/types.landingHowItWorksModel'
      beforeAfter:
        $ref: '#/$defs/types.landingBeforeAfterModel'
      testimonialsGrid:
        $ref: '#/$defs/types.landingTestimonialsGridModel'
      trustBlock:
        $ref: '#/$defs/types.landingTrustBlockModel'
      fullImage:
        $ref: '#/$defs/types.landingFullImageModel'
      caseStudies:
        $ref: '#/$defs/types.landingCaseStudiesModel'
      pricing:
        $ref: '#/$defs/types.landingPricingModel'
      pricingComparison:
        $ref: '#/$defs/types.landingPricingComparisonModel'
      roadmap:
        $ref: '#/$defs/types.landingRoadmapModel'
      faq:
        $ref: '#/$defs/types.landingFaqModel'
      featuresTitle:
        $ref: '#/$defs/types.nonEmptyString'
      featuresSubtitle:
        type: string
      features:
        type: array
        items:
          $ref: '#/$defs/types.landingFeatureItem'
      cta:
        $ref: '#/$defs/types.landingCtaModel'
  types.postModel:
    type: object
    additionalProperties: true
    required:
    - title
    - date
    - author
    - href
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      date:
        type: string
      author:
        $ref: '#/$defs/types.nonEmptyString'
      href:
        $ref: '#/$defs/types.urlString'
      excerpt:
        type: string
      readingTime:
        type: string
      imageSrc:
        $ref: '#/$defs/types.urlString'
      imageAlt:
        type: string
  template.base:
    type: object
    additionalProperties: true
    required:
    - title
    - page
    - seo
    - site
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      page:
        $ref: '#/$defs/types.pageModel'
      seo:
        $ref: '#/$defs/types.seoModel'
      site:
        type: object
        additionalProperties: true
        required:
        - baseUrl
        - navbar
        properties:
          baseUrl:
            $ref: '#/$defs/types.urlString'
          navbar:
            type: object
            additionalProperties: true
            required:
            - title
            properties:
              title:
                $ref: '#/$defs/types.nonEmptyString'
              cta:
                $ref: '#/$defs/types.cta'
  template.docs:
    type: object
    additionalProperties: true
    required:
    - title
    - page
    - seo
    - site
    - docs
    - sidebarId
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      page:
        $ref: '#/$defs/types.pageModel'
      seo:
        $ref: '#/$defs/types.seoModel'
      site:
        $ref: '#/$defs/types.siteModel'
      docs:
        $ref: '#/$defs/types.docsModel'
      sidebarId:
        $ref: '#/$defs/types.nonEmptyString'
  template.landingFeatures:
    type: object
    additionalProperties: true
    required:
    - title
    - page
    - seo
    - site
    - landing
    properties:
      title:
        $ref: '#/$defs/types.nonEmptyString'
      page:
        $ref: '#/$defs/types.pageModel'
      seo:
        $ref: '#/$defs/types.seoModel'
      site:
        type: object
        additionalProperties: true
        required:
        - baseUrl
        - navbar
        - footer
