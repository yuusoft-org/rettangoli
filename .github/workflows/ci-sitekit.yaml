name: CI Sitekit
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-sitekit.yaml"
      - "package.json"
      - "bun.lock"
      - "packages/rettangoli-cli/**"
      - "packages/rettangoli-sites/**"
      - "packages/rettangoli-vt/**"
      - "packages/rettangoli-sitekit/**"
  pull_request:
    paths:
      - ".github/workflows/ci-sitekit.yaml"
      - "package.json"
      - "bun.lock"
      - "packages/rettangoli-cli/**"
      - "packages/rettangoli-sites/**"
      - "packages/rettangoli-vt/**"
      - "packages/rettangoli-sitekit/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sitekit-build-and-vt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Preview Site
        run: bun run build
        working-directory: ./packages/rettangoli-sitekit

      - name: Run VT Smoke Checks
        run: bun run vt:ci
        working-directory: ./packages/rettangoli-sitekit

      - name: Upload Sitekit VT Artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: sitekit-vt-${{ github.run_number }}
          path: packages/rettangoli-sitekit/.rettangoli/
          include-hidden-files: true
          retention-days: 30
