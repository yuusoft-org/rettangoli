name: Publish package @rettangoli/sitekit to npm
on:
  push:
    tags:
      - 'sitekit-v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish-sitekit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --provenance
        working-directory: ./packages/rettangoli-sitekit
